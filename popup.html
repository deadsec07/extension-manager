<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Extension Manager</title>
  <style>
    body { font: 14px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 12px; width: 360px; }
    .row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .pill { padding: 6px 10px; border-radius: 999px; border: 1px solid #ddd; display: inline-flex; gap: 6px; align-items: center; }
    .list { max-height: 180px; overflow: auto; border: 1px solid #eee; border-radius: 8px; padding: 8px; }
    .ext { display: grid; grid-template-columns: auto 1fr auto; gap: 8px; align-items: center; padding: 6px 0; }
    .ext .name { font-weight: 600; }
    .ext .id { color: #666; font-size: 12px; }
    .tag { font-size: 12px; border: 1px solid #ddd; padding: 2px 6px; border-radius: 999px; }
    button { padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; cursor: pointer; }
    button.primary { background: #111; color: #fff; border-color: #111; }
    .muted { color: #666; }
    .small { font-size: 12px; }
    .hint { margin-top: 6px; color: #555; font-size: 12px; }
  </style>
</head>
<body>
  <div class="row">
    <button id="btnDisableAllExcept" class="primary">Disable all except exclusions</button>
    <button id="btnEnableOnly">Enable only inclusions</button>
  </div>
  <div class="row">
    <button id="btnSnapshot">Snapshot</button>
    <button id="btnRestore">Restore</button>
    <a href="#" id="openOptions" class="small">Manage lists…</a>
  </div>

  <div class="hint">Inclusions are the only ones turned on; exclusions are protected from “disable all”.</div>

  <h3>Extensions</h3>
  <div id="list" class="list"></div>
  <p class="small muted" style="margin-top:10px">
    by <a href="https://hnetechnologies.com" target="_blank" rel="noopener noreferrer">hnetechnologies.com</a>
  </p>
  <script src="popup.js"></script>
</body>
</html>
